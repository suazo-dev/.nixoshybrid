########################
## CORE / QUALITY-OF-LIFE
########################
set -g default-terminal "tmux-256color"
set -g status-interval 3
set -g mouse on
set -g status-position bottom
set -g status-style "fg=#cdd6f4,bg=#000000"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g mode-style "fg=#cdd6f4,bg=#313244"
set -g status-left-length 200
set -g status-right-length 200
set -g status-justify left

# Truecolor (works in modern terminals; keep simple and robust)
set -sa terminal-features 'xterm-256color:RGB'
set -sa terminal-features 'tmux-256color:RGB'

########################
## KEYS / NAVIGATION
########################
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

unbind r
bind r source-file ~/.nixos/modules/terminal/tmux/dotfiles/tmux/tmux.conf \; run-shell "bash ~/.nixos/modules/terminal/tmux/dotfiles/tmux/scripts/status-style" \; display-message "tmux reloaded"

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start windows/panes at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Split keep cwd
bind '"' split-window -v -c "#{pane_current_path}"
bind %   split-window -h -c "#{pane_current_path}"

# Quick pane/window movement without prefix (optional)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
bind -n S-Left  previous-window
bind -n S-Right next-window

# Copy-mode tweaks
setw -g mode-keys vi
bind-key -T copy-mode-vi v  send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y  send-keys -X copy-selection-and-cancel

########################
## PALETTE (your colors)
########################
set -g @PINK      "#f5c2e7"
set -g @ROSEWATER "#f5e0dc"
set -g @MAUVE     "#cba6f7"
set -g @RED       "#f38ba8"
set -g @PEACH     "#fab387"
set -g @YELLOW    "#f9e2af"
set -g @GREEN     "#a6e3a1"
set -g @BLUE      "#89b4fa"
set -g @SAPPHIRE  "#74c7ec"
set -g @LAVENDER  "#b4befe"

set -g @TEXT      "#cdd6f4"
set -g @OVERLAY2  "#9399b2"
set -g @OVERLAY1  "#7f849c"
set -g @OVERLAY0  "#6c7086"
set -g @SURFACE2  "#585b70"
set -g @SURFACE1  "#45475a"
set -g @SURFACE0  "#313244"
set -g @BACKGROUND "#000000"

########################
## ICONS + STYLE TOGGLE
########################
set -g @icon_folder ""         # folder icon (full-looking)
set -g @branch_icon "󰊤"         # git branch icon you chose
set -g @style "tri"              # kept for compatibility; status uses plain separators

########################
## WINDOWS (boxed tabs)
########################
set -g window-status-separator ""
setw -g window-status-style          "fg=#{@OVERLAY1},bg=#{@BACKGROUND}"
setw -g window-status-format         ' #[fg=#{@OVERLAY0}]│  #[fg=#{@OVERLAY1}]#I:#W '
setw -g window-status-current-format ' #[fg=#{@OVERLAY0}]│  #[fg=#{@TEXT},bold]#I:#W #[nobold]'

########################
## PANE BORDERS
########################
set -g pane-border-lines single
set -g pane-border-style        "fg=#{@SURFACE1}"
set -g pane-active-border-style "fg=#{@OVERLAY0}"

########################
## APPLY THE STYLE (left/right statuslines)
########################
run-shell 'bash ~/.nixos/modules/terminal/tmux/dotfiles/tmux/scripts/status-style'
