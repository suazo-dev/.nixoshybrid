[custom.project]
shell = ["sh"]
command = """
dir=\"$PWD\"
while [ \"$dir\" != \"/\" ]; do
  if [ -f \"$dir/Cargo.toml\" ]; then
    printf '¾▒İù Rust'
    exit 0
  fi
  if [ -f \"$dir/pyproject.toml\" ] || [ -f \"$dir/uv.lock\" ] || [ -f \"$dir/requirements.txt\" ] || [ -f \"$dir/Pipfile\" ] || [ -f \"$dir/poetry.lock\" ]; then
    printf '¯êÁ Python'
    exit 0
  fi
  if [ -f \"$dir/package.json\" ] || [ -f \"$dir/bun.lock\" ] || [ -f \"$dir/bun.lockb\" ] || [ -f \"$dir/deno.json\" ] || [ -f \"$dir/deno.jsonc\" ] || [ -f \"$dir/tsconfig.json\" ]; then
    printf '¯£İ JS'
    exit 0
  fi
  if [ -f \"$dir/go.mod\" ]; then
    printf '¯İğ Go'
    exit 0
  fi
  if [ -f \"$dir/gleam.toml\" ]; then
    printf '¾░ĞÑ Gleam'
    exit 0
  fi
  for file in \"$dir\"/*.gleam; do
    if [ -e \"$file\" ]; then
      printf '¾░ĞÑ Gleam'
      exit 0
    fi
  done
  if [ -f \"$dir/flake.nix\" ] || [ -f \"$dir/shell.nix\" ]; then
    printf '´îô Nix'
    exit 0
  fi
  if [ -f \"$dir/CMakeLists.txt\" ] || [ -f \"$dir/meson.build\" ]; then
    printf '¯İŞ C'
    exit 0
  fi
  for file in \"$dir\"/*.c \"$dir\"/*.h; do
    if [ -e \"$file\" ]; then
      printf '¯İŞ C'
      exit 0
    fi
  done
  parent=$(dirname \"$dir\")
  [ \"$parent\" = \"$dir\" ] && break
  dir=\"$parent\"
done
exit 1
"""
when = """
dir=\"$PWD\"
while [ \"$dir\" != \"/\" ]; do
  if [ -f \"$dir/Cargo.toml\" ] || [ -f \"$dir/pyproject.toml\" ] || [ -f \"$dir/uv.lock\" ] || [ -f \"$dir/requirements.txt\" ] || [ -f \"$dir/Pipfile\" ] || [ -f \"$dir/poetry.lock\" ] || [ -f \"$dir/package.json\" ] || [ -f \"$dir/bun.lock\" ] || [ -f \"$dir/bun.lockb\" ] || [ -f \"$dir/deno.json\" ] || [ -f \"$dir/deno.jsonc\" ] || [ -f \"$dir/tsconfig.json\" ] || [ -f \"$dir/go.mod\" ] || [ -f \"$dir/gleam.toml\" ] || [ -f \"$dir/flake.nix\" ] || [ -f \"$dir/shell.nix\" ] || [ -f \"$dir/CMakeLists.txt\" ] || [ -f \"$dir/meson.build\" ]; then
    exit 0
  fi
  for file in \"$dir\"/*.gleam \"$dir\"/*.c \"$dir\"/*.h; do
    if [ -e \"$file\" ]; then
      exit 0
    fi
  done
  parent=$(dirname \"$dir\")
  [ \"$parent\" = \"$dir\" ] && break
  dir=\"$parent\"
done
exit 1
"""
style = "mauve"
format = "[ | ](overlay0)[$output]($style)"

